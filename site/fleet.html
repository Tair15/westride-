<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fleet | Westride</title>
    <meta name="description" content="Westride fleet: Sedan, SUV and Minivan options for every ride across NYC and North Jersey." />
    <link rel="icon" href="assets/images/westride-logo.png" type="image/png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="flex min-h-screen flex-col items-center">
    <section class="flex w-full flex-col">
      <!-- @include header -->
    </section>

    <!-- Fleet -->
    <main class="mt-[50px] w-full">
      <section class="mx-auto flex w-full max-w-[1300px] flex-col items-start gap-5 px-5 py-10">
        <div class="mx-0 mb-[100px] mt-5 w-full text-center">
          <h2 class="my-5 text-[26px] font-medium leading-none md:text-[35px] nav:text-[50px]">We have a variety of cars to your Service</h2>
        </div>

        <div class="flex w-full flex-col">
          <article class="my-5 flex w-full flex-col items-start text-start">
            <span class="text-[18px] font-medium md:text-[20px] nav:text-[25px]">Sedan</span>
            <img src="assets/images/sedan.png" alt="Sedan" class="block h-auto w-full max-w-[705px]" />
          </article>

          <article class="my-5 flex w-full flex-col items-start text-start">
            <span class="text-[18px] font-medium md:text-[20px] nav:text-[25px]">SUV</span>
            <img src="assets/images/suv.png" alt="SUV" class="block h-auto w-full max-w-[705px]" />
          </article>

          <article class="my-5 flex w-full flex-col items-start text-start">
            <span class="text-[18px] font-medium md:text-[20px] nav:text-[25px]">Minivan</span>
            <img src="assets/images/minivan.png" alt="Minivan" class="block h-auto w-full max-w-[705px]" />
          </article>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <!-- @include footer -->

    <script src="assets/js/main.js" defer></script>
  </body>
</html>
