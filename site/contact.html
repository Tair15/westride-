<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact us | Westride</title>
    <meta name="description" content="Get in touch with Westride. Tell us how we can help with your ride, booking or support question." />
    <link rel="icon" href="assets/images/westride-logo.png" type="image/png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="flex min-h-screen flex-col items-center">
    <section class="flex w-full flex-col">
      <!-- @include header -->
    </section>

    <!-- Contact (layout mirrors insclicks.com/contactus.php) -->
    <main class="w-full">
      <div class="w-full pt-3">
        <h1 class="px-5 py-6 text-center font-display text-[40px] font-extrabold uppercase tracking-wide md:text-[56px]">Contact us</h1>
      </div>

      <section class="mx-auto w-full max-w-[1100px] px-5 pb-20">
        <h3 class="mb-8 text-center text-[24px] font-medium md:text-[32px]">Ride with confidence</h3>

        <div class="grid grid-cols-1 items-start gap-10 md:grid-cols-2">
          <div>
            <h5 class="text-[22px] font-medium leading-snug md:text-[28px]">Tell us how can we help you.</h5>
          </div>

          <div>
            <form class="flex flex-col gap-5" action="contactus.php" method="POST">
              <div>
                <label for="contact-select-type" class="sr-only">Type of request</label>
                <select
                  name="type"
                  id="contact-select-type"
                  class="w-full rounded-[3px] border border-muted px-3.5 py-3 text-base"
                >
                  <option value="select">Select</option>
                  <option value="generalinfo">General info</option>
                  <option value="support">Support</option>
                  <option value="booking">Booking</option>
                </select>
              </div>

              <div id="form-inputs" class="hidden flex-col gap-5">
                <input data-required type="text" name="fullname" aria-label="Your full name" placeholder="Your Full Name" class="w-full rounded-[3px] border border-muted px-3.5 py-3 text-base" />
                <input data-required type="email" name="email" aria-label="Your e-mail" placeholder="Your E-mail" class="w-full rounded-[3px] border border-muted px-3.5 py-3 text-base" />
                <input data-required type="tel" name="mobile" aria-label="Your mobile number" placeholder="Your Mobile Number" class="w-full rounded-[3px] border border-muted px-3.5 py-3 text-base" />
                <input data-required type="text" name="subject" aria-label="Subject" placeholder="Subject of your contact" class="w-full rounded-[3px] border border-muted px-3.5 py-3 text-base" />
                <textarea data-required name="message" aria-label="Your message" placeholder="Your message" class="min-h-[120px] w-full resize-none rounded-[3px] border border-muted px-3.5 py-3 text-base"></textarea>
                <button
                  type="submit"
                  class="mt-2 cursor-pointer self-start rounded-[20px] bg-brand-red px-10 py-5 font-display text-lg font-bold uppercase leading-none text-white"
                >
                  Send&nbsp;&nbsp;&rarr;
                </button>
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <!-- @include footer -->

    <script src="assets/js/main.js" defer></script>
  </body>
</html>
